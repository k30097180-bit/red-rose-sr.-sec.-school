<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Red Rose Sr. Sec. School</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="assets/css/login.css">
</head>

<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-panel">
                <div class="branding">
                    <img src="assets/images/logo/logo.jpg" alt="Red Rose School Logo">
                    <h1>Red Rose Sr. Sec. School</h1>
                    <p>Secure student portal access for parents and students. Please login to continue.</p>
                </div>
            </div>

            <div class="login-form-wrap">
                <div class="login-form-card">
                    <div class="login-form-header">
                        <h2>Welcome Back</h2>
                        <p>Login to access school updates and admission services.</p>
                    </div>

                    <div id="loginToast" class="toast"></div>

                    <form id="loginForm" class="login-form">
                        <div class="form-group">
                            <label for="loginUsername">Username or Email</label>
                            <input type="text" id="loginUsername" placeholder="admin or email" autocomplete="username">
                        </div>

                        <div class="form-group">
                            <label for="loginPassword">Password</label>
                            <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">
                        </div>

                        <div class="form-row">
                            <label class="checkbox-label">
                                <input type="checkbox" id="rememberMe">
                                <span>Remember Me</span>
                            </label>
                            <a href="create-account.html" class="create-link">Create account</a>
                        </div>

                        <button type="submit" id="loginButton" class="login-button">Login</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="assets/js/login.js"></script>
</body>

</html>
